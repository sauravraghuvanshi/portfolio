name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create deployment zip
        run: |
          cd .next/standalone
          zip -rq $GITHUB_WORKSPACE/standalone-deploy.zip .

      - name: Deploy to Azure via Kudu zip-deploy
        run: |
          curl -X POST \
            --max-time 300 \
            --retry 2 \
            -u "${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASSWORD }}" \
            -H "Content-Type: application/zip" \
            --data-binary @$GITHUB_WORKSPACE/standalone-deploy.zip \
            "https://sauravraghuvanshi-portfolio.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -w "\nHTTP status: %{http_code}\n" \
            -f
