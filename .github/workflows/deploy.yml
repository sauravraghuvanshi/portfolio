name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_AZURE_STORAGE_URL: https://sauravportfoliomedia.blob.core.windows.net/blog-images
        run: npm run build

      - name: Create deployment zip
        run: |
          cd .next/standalone
          zip -rq $GITHUB_WORKSPACE/standalone-deploy.zip .

      - name: Deploy to Azure via Kudu zip-deploy
        env:
          DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASSWORD }}
        run: |
          HTTP_STATUS=$(curl -X POST \
            --max-time 300 \
            -u "${DEPLOY_USER}:${DEPLOY_PASS}" \
            -H "Content-Type: application/zip" \
            --data-binary @"$GITHUB_WORKSPACE/standalone-deploy.zip" \
            "https://saurav-portfolio.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -w "%{http_code}" \
            -o /tmp/deploy-response.txt \
            -s)
          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/deploy-response.txt
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Deployment failed with HTTP $HTTP_STATUS"
            exit 1
          fi
