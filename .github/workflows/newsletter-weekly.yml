name: Weekly Newsletter Generator

on:
  schedule:
    # Every Saturday at 8:00 AM UTC
    - cron: "0 8 * * 6"
  workflow_dispatch:
    inputs:
      weekOf:
        description: "Week start date (YYYY-MM-DD, optional)"
        required: false
        default: ""

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Generate weekly newsletter
        env:
          NEWSLETTER_CRON_SECRET: ${{ secrets.NEWSLETTER_CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://saurav-portfolio.azurewebsites.net' }}
        run: |
          WEEK_OF="${{ github.event.inputs.weekOf }}"

          if [ -n "$WEEK_OF" ]; then
            BODY="{\"weekOf\":\"$WEEK_OF\"}"
          else
            BODY="{}"
          fi

          echo "Triggering newsletter generation..."
          HTTP_STATUS=$(curl -s -o /tmp/newsletter-response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${NEWSLETTER_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            --max-time 120 \
            "${SITE_URL}/api/admin/newsletter/weekly")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/newsletter-response.txt

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Newsletter generation failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Newsletter draft created successfully!"
